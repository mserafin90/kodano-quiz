<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dobierz okulary – KODANO Optyk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#212529;--ink2:#343a40;
      --or:#E7511E;--or2:#C94218;--olt:#FDF0EB;--omid:#F9D5C5;
      --wh:#fff;--bg:#F5F4F2;
      --bd:#E2E2DE;--bd2:#C8C8C2;
      --mu:#6B6B65;--hi:#9A9A93;
      --gr:#2B7A4B;--grlt:#EBF7F1;--grmid:#C3E8D5;
      --r:12px;--rs:8px;--rx:6px;
      --sh:0 2px 20px rgba(33,37,41,.08);
      --tr:.16s cubic-bezier(.4,0,.2,1);
    }
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.75rem 1rem 3.5rem}

    /* header */
    .ph{width:100%;max-width:700px;display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
    .lm{display:flex;align-items:center;text-decoration:none}
    .lk{background:var(--ink);color:#fff;font-size:14px;font-weight:700;letter-spacing:.05em;padding:5px 11px;border-radius:var(--rx)}
    .lo{font-size:11px;font-weight:600;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;margin-left:9px}
    .hs{width:1px;height:18px;background:var(--bd)}
    .ht{font-size:12px;color:var(--hi);font-weight:500}

    /* card */
    .card{background:var(--wh);border-radius:16px;border:1px solid var(--bd);box-shadow:var(--sh);width:100%;max-width:700px;padding:2.25rem 2.25rem 1.75rem;position:relative;overflow:hidden}
    .card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--or)}

    /* progress */
    .pr{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
    .pt{flex:1;height:4px;background:var(--bd);border-radius:99px;overflow:hidden}
    .pf{height:100%;border-radius:99px;background:var(--or);transition:width .4s cubic-bezier(.4,0,.2,1)}
    .ptx{font-size:12px;font-weight:600;color:var(--hi);white-space:nowrap;min-width:36px;text-align:right}

    /* step */
    .step{animation:fu .25s ease both}
    @keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .ey{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--or);background:var(--olt);padding:3px 9px;border-radius:99px;margin-bottom:.65rem}
    .sq{font-size:22px;font-weight:700;color:var(--ink);line-height:1.25;margin-bottom:.35rem}
    .ss{font-size:14px;color:var(--mu);line-height:1.6;margin-bottom:1.4rem}
    .mb{display:inline-block;font-size:11px;font-weight:600;color:var(--mu);border:1px solid var(--bd2);padding:3px 10px;border-radius:99px;margin-bottom:1rem}

    /* options */
    .opts{display:grid;gap:9px}
    .opts.c2{grid-template-columns:repeat(2,1fr)}
    .opts.c3{grid-template-columns:repeat(3,1fr)}
    .opt{border:1.5px solid var(--bd);border-radius:var(--r);background:var(--wh);padding:15px 12px 13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:border-color var(--tr),background var(--tr),transform var(--tr),box-shadow var(--tr);-webkit-tap-highlight-color:transparent;outline:none;font-family:inherit}
    .opt:hover{border-color:var(--or);background:var(--olt);transform:translateY(-1px);box-shadow:0 1px 6px rgba(33,37,41,.06)}
    .opt:active{transform:none}
    .opt.sel{border-color:var(--or);border-width:2px;background:var(--olt);box-shadow:0 0 0 3px rgba(231,81,30,.10)}
    .opt.sel .ol{color:var(--or2)}
    .ov{height:52px;display:flex;align-items:center;justify-content:center;width:100%}
    .ol{font-size:13px;font-weight:700;color:var(--ink);line-height:1.2}
    .od{font-size:11px;color:var(--mu);line-height:1.4}

    /* nav */
    .nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.75rem;padding-top:1.25rem;border-top:1px solid var(--bd)}
    .bb{font-size:13px;font-weight:500;color:var(--mu);background:none;border:none;cursor:pointer;font-family:inherit;padding:8px 2px;transition:color var(--tr)}
    .bb:hover{color:var(--ink)}
    .bn{display:inline-flex;align-items:center;gap:6px;background:var(--or);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:inherit;padding:11px 26px;cursor:pointer;transition:background var(--tr),transform var(--tr),opacity var(--tr)}
    .bn:hover:not(:disabled){background:var(--or2);transform:translateY(-1px)}
    .bn:active:not(:disabled){transform:none}
    .bn:disabled{opacity:.3;cursor:not-allowed}

    /* result */
    .res{animation:fu .3s ease both}
    .rh{background:var(--ink);border-radius:12px;padding:1.75rem 1.5rem;color:#fff;text-align:center;margin-bottom:.9rem}
    .re{font-size:40px;margin-bottom:.65rem}
    .rt{font-size:24px;font-weight:700;margin-bottom:.4rem}
    .rs{font-size:14px;color:#A8ADB5;line-height:1.6;max-width:440px;margin:0 auto 1.4rem}
    .rtags{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-bottom:1.5rem}
    .rtag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:500;padding:4px 12px;border-radius:99px}
    .cta{display:inline-flex;align-items:center;gap:8px;background:var(--or);color:#fff;padding:13px 30px;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:inherit;text-decoration:none;border:none;cursor:pointer;transition:background var(--tr),transform var(--tr)}
    .cta:hover{background:var(--or2);transform:translateY(-1px)}

    /* lens recommendation card */
    .lens-card{border:1px solid var(--grmid);border-radius:var(--r);background:var(--grlt);padding:1.25rem 1.5rem;margin-bottom:.9rem}
    .lens-title{font-size:13px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
    .lens-items{display:flex;flex-direction:column;gap:.6rem}
    .lens-item{display:flex;align-items:flex-start;gap:10px}
    .lens-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0;margin-top:5px}
    .lens-text{font-size:13px;color:var(--ink);line-height:1.5}
    .lens-text strong{font-weight:600;color:var(--ink2)}
    .lens-text a{color:var(--or);text-decoration:none;font-weight:600}
    .lens-text a:hover{text-decoration:underline}

    .br{width:100%;background:none;border:1.5px solid var(--bd);color:var(--mu);font-size:13px;font-family:inherit;font-weight:500;border-radius:var(--rs);padding:10px;cursor:pointer;margin-top:.75rem;transition:border-color var(--tr),color var(--tr)}
    .br:hover{border-color:var(--ink);color:var(--ink)}
    .fn{margin-top:1.25rem;font-size:11px;color:var(--hi);text-align:center}
    .fn a{color:var(--or);text-decoration:none}
    .fn a:hover{text-decoration:underline}

    @media(max-width:540px){
      body{padding:1rem .75rem 2.5rem}
      .card{padding:1.5rem 1.1rem 1.25rem;border-radius:12px}
      .sq{font-size:19px}
      .opts.c3{grid-template-columns:repeat(2,1fr)}
    }
    @media(max-width:360px){.opts.c2,.opts.c3{grid-template-columns:1fr}}
  </style>
</head>

/* ═══════════════════════════════════════════════

  const price = { '0-100':'0.01-100.00','100-250':'100.00-250.00','250-500':'250.00-500.00','500plus':'500.00-9999.00' }[A.budzet && A.budzet.v] || '';

  let base;
  if (zast === 'kierowca')  base = 'https://kodano.pl/okulary-dla-kierowcow.html';
  else if (zast === 'komputer') base = 'https://kodano.pl/okulary-do-komputera.html';
  else if (plec === 'damskie')  base = 'https://kodano.pl/okulary-korekcyjne/damskie-unisex.html';
  else if (plec === 'meskie')   base = 'https://kodano.pl/okulary-korekcyjne/meskie-unisex.html';
  else if (plec === 'dzieci')   base = 'https://kodano.pl/okulary-korekcyjne/dzieciece.html';
  else base = 'https://kodano.pl/okulary-korekcyjne.html';

  return price ? base + '?price=' + price : base;
}

/* ═══════════════════════════════════════════════
   LENS RECOMMENDATIONS
   Oparte na zastosowaniu + wadzie wzroku
═══════════════════════════════════════════════ */
function getLensRecs(A) {
  const zast = A.zast && A.zast.v;
  const wada = A.wada && A.wada.v;
  const recs = [];

  /* Soczewki do komputera / ekranów */
  if (zast === 'komputer') {
    recs.push({
      text: `<strong>Soczewki z filtrem Blue Blocker</strong> — redukują niebieskie światło z ekranów, zmniejszają zmęczenie oczu przy wielogodzinnej pracy.`,
      link: 'https://kodano.pl/okulary-do-komputera.html',
      linkText: 'Zobacz okulary do komputera'
    });
  }

  /* Soczewki do jazdy */
  if (zast === 'kierowca') {
    recs.push({
      text: `<strong>Soczewki z powłoką antyrefleksyjną (AR)</strong> — eliminują odbicia od świateł nadjeżdżających aut, szczególnie nocą.`,
      link: 'https://kodano.pl/okulary-dla-kierowcow.html',
      linkText: 'Zobacz okulary dla kierowców'
    });
  }

  /* Presbyopia → progresywne */
  if (wada === 'presbi' || wada === 'dal_i_bliz' || zast === 'dal_i_bliz') {
    recs.push({
      text: `<strong>Soczewki progresywne</strong> — korygujesz dal i bliż w jednej parze okularów, bez konieczności noszenia dwóch par. Idealne przy presbyopii i kombinowanych wadach.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Cennik soczewek progresywnych'
    });
  }

  /* Astygmatyzm → cylindryczne */
  if (wada === 'astygm' || wada === 'wielok') {
    recs.push({
      text: `<strong>Soczewki toryczne (cylindryczne)</strong> — specjalnie zaprojektowane do korekcji astygmatyzmu. Ważne, aby oprawka dobrze przylegała do nosa i nie zsuwała się.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Cennik soczewek'
    });
  }

  /* Krótkowzroczność wysoka → cienkie indeks */
  if (wada === 'krotko') {
    recs.push({
      text: `<strong>Soczewki wysokoindeksowe (1.6 lub 1.67)</strong> — przy krótkowzroczności powyżej –3D znacznie cieńsze i lżejsze niż standardowe. Szczególnie ważne przy mniejszych oprawkach.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Porównaj soczewki'
    });
  }

  /* Dalekowzroczność */
  if (wada === 'daleko') {
    recs.push({
      text: `<strong>Soczewki sferyczne lub asferyczne</strong> — przy dalekowzroczności soczewki asferyczne są cieńsze na brzegach i dają mniej zniekształceń. Warto też rozważyć powłokę AR.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Sprawdź cennik'
    });
  }

  /* Sport */
  if (zast === 'sport') {
    recs.push({
      text: `<strong>Soczewki poliwęglanowe lub Trivex</strong> — odporne na uderzenia, lżejsze od plastiku, z wbudowaną ochroną UV. Idealne do sportu i aktywności na zewnątrz.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Dowiedz się więcej'
    });
  }

  /* Nieznana wada → badanie */
  if (wada === 'nieznana') {
    recs.push({
      text: `<strong>Zacznij od badania wzroku</strong> — bez aktualnej recepty nie dobierzesz właściwych soczewek. W salonach KODANO Optyk badanie wzroku jest bezpłatne.`,
      link: 'https://kodano.pl/stationary_stores.html',
      linkText: 'Znajdź salon KODANO w swoim mieście'
    });
  }

  /* Domyślny fallback */
  if (recs.length === 0) {
    recs.push({
      text: `<strong>Soczewki jednogniskowe z powłoką AR</strong> — dobry wybór na co dzień. Powłoka antyrefleksyjna zwiększa komfort widzenia i zmniejsza odbicia.`,
      link: 'https://kodano.pl/cennik-soczewek.html',
      linkText: 'Sprawdź cennik soczewek'
    });
  }

  return recs;
}

/* ═══════════════════════════════════════════════
   STATE & RENDER
═══════════════════════════════════════════════ */
const A = {};
let cur = 0;
const TOTAL = STEPS.length;

function render(i) {
  document.getElementById('pbar').style.width = Math.round(i/TOTAL*100)+'%';
  document.getElementById('ptx').textContent = i+' / '+TOTAL;
  if (i >= TOTAL) { showResult(); return; }

  const s = STEPS[i], isM = s.multi;
  const sel = A[s.id] || (isM ? [] : null);

  const optsH = s.opts.map(o => {
    const on = isM ? sel.some(x=>x.v===o.v) : (sel&&sel.v===o.v);
    const vis = o.svg
      ? `<div class="ov">${o.svg}</div>`
      : `<div class="ov" style="font-size:32px;line-height:1">${o.icon}</div>`;
    return `<button class="opt${on?' sel':''}" onclick="pick(${i},${JSON.stringify(o).replace(/"/g,'&quot;')},${isM})" aria-pressed="${on}">${vis}<span class="ol">${o.l}</span><span class="od">${o.d}</span></button>`;
  }).join('');

  const ok = isM ? (A[s.id]&&A[s.id].length>0) : !!A[s.id];
  document.getElementById('sc').innerHTML = `
    <div class="step">
      <div class="ey">${s.ey}</div>
      <h2 class="sq">${s.q}</h2>
      <p class="ss">${s.sub}</p>
      ${isM?'<div class="mb">Możesz wybrać kilka</div>':''}
      <div class="opts ${s.cols}" role="group">${optsH}</div>
      <div class="nav">
        ${i>0?`<button class="bb" onclick="back()">← Wróć</button>`:'<span></span>'}
        <button class="bn" onclick="next()" ${!ok?'disabled':''}>
          ${i===TOTAL-1?'Pokaż wyniki →':'Dalej →'}
        </button>
      </div>
    </div>`;
}

function pick(si, o, isM) {
  const id = STEPS[si].id;
  if (isM) {
    if (!A[id]) A[id]=[];
    const idx = A[id].findIndex(x=>x.v===o.v);
    idx>-1 ? A[id].splice(idx,1) : A[id].push(o);
  } else { A[id]=o; }
  render(cur);
}

function next() { cur++; render(cur); scrollTo({top:0,behavior:'smooth'}); }
function back() { if(cur>0){cur--;render(cur);scrollTo({top:0,behavior:'smooth'});} }

function showResult() {
  document.getElementById('pbar').style.width='100%';
  document.getElementById('ptx').textContent=TOTAL+' / '+TOTAL;

  const url = buildURL(A);
  const lensRecs = getLensRecs(A);

  const tags = [];
  STEPS.forEach(s=>{ if(!A[s.id])return; if(s.multi)A[s.id].forEach(o=>tags.push(o.l)); else tags.push(A[s.id].l); });

  const lensHTML = lensRecs.map(r => `
    <div class="lens-item">
      <div class="lens-dot"></div>
      <div class="lens-text">${r.text} <a href="${r.link}" target="_blank" rel="noopener">${r.linkText} →</a></div>
    </div>`).join('');

  document.getElementById('sc').innerHTML = `
    <div class="res">
      <div class="rh">
        <div class="re">🎉</div>
        <h2 class="rt">Twoje okulary czekają!</h2>
        <p class="rs">Kliknij poniżej — otworzymy sklep Kodano.pl z wynikami dopasowanymi do Twoich odpowiedzi.</p>
        <div class="rtags">${tags.map(t=>`<span class="rtag">${t}</span>`).join('')}</div>
        <a class="cta" href="${url}" target="_blank" rel="noopener">Zobacz dopasowane oprawki →</a>
      </div>
      <div class="lens-card">
        <div class="lens-title">🔬 Rekomendacja soczewek okularowych</div>
        <div class="lens-items">${lensHTML}</div>
      </div>
      <button class="br" onclick="restart()">↺ Zacznij od nowa</button>
    </div>`;
}

function restart() { Object.keys(A).forEach(k=>delete A[k]); cur=0; render(0); scrollTo({top:0,behavior:'smooth'}); }

render(0);
</script>
